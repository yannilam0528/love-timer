<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋爱日记 · 心情日历</title>
  <style>
    /* ===== 全局样式 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      padding: 20px;
    }

    /* ===== 整体容器 ===== */
    .calendar-wrapper {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #f5f0eb;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.03), 0 8px 40px rgba(0, 0, 0, 0.02);
      padding: 36px 32px 32px;
      max-width: 700px;
      width: 100%;
    }

    /* ===== 标题 ===== */
    .calendar-title {
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: #b8a9a0;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .calendar-title .heart {
      color: #e8c5b0;
    }

    /* ===== 月份导航 ===== */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .month-nav .nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #ede8e3;
      background: #fafaf8;
      cursor: pointer;
      font-size: 16px;
      color: #8a7a70;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .month-nav .nav-btn:hover {
      background: #f5f0eb;
      border-color: #d4c8b8;
    }

    .month-nav .nav-btn:active {
      transform: scale(0.95);
    }

    .month-nav .current-month {
      font-size: 18px;
      font-weight: 500;
      color: #4a3f38;
      min-width: 120px;
      text-align: center;
    }

    /* ===== 回到今天按钮 ===== */
    .back-today {
      text-align: center;
      margin-bottom: 16px;
    }

    .back-today-btn {
      font-size: 13px;
      color: #b8a9a0;
      background: none;
      border: 1px solid #ede8e3;
      border-radius: 16px;
      padding: 4px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .back-today-btn:hover {
      color: #8a7a70;
      border-color: #d4c8b8;
    }

    .back-today-btn.hidden {
      display: none;
    }

    /* ===== 星期头 ===== */
    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
      text-align: center;
    }

    .weekday-header .weekday {
      font-size: 13px;
      color: #c4b8af;
      font-weight: 500;
      padding: 6px 0;
    }

    .weekday-header .weekday.weekend {
      color: #d4b0a0;
    }

    /* ===== 日历格子 ===== */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1 / 1;
      min-height: 60px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: #fafaf8;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      padding: 4px;
      position: relative;
    }

    .day-cell:hover {
      border-color: #e0d8cc;
      background: #fdfaf6;
    }

    .day-cell.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .day-cell.other-month {
      background: transparent;
      opacity: 0.35;
    }

    .day-cell.today {
      border-color: #e8c5b0 !important;
      background: #fefaf7;
    }

    .day-cell.selected {
      border-color: #c4a890 !important;
      background: #faf5ef;
      box-shadow: 0 0 0 3px rgba(196, 168, 144, 0.1);
    }

    .day-cell .day-num {
      font-size: 13px;
      color: #4a3f38;
      font-weight: 500;
      line-height: 1;
      margin-bottom: 4px;
    }

    .day-cell.today .day-num {
      color: #d4a080;
      font-weight: 600;
    }

    .day-cell .mood-row {
      display: flex;
      align-items: center;
      gap: 2px;
      line-height: 1;
    }

    .day-cell .mood-emoji {
      font-size: 14px;
      line-height: 1;
    }

    .day-cell .mood-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .day-cell .mood-dot.circle {
      background: #d4a990;
    }

    .day-cell .mood-dot.square {
      background: #b0a4c0;
      border-radius: 1.5px;
    }

    .day-cell .mood-empty {
      color: #ddd8d0;
      font-size: 12px;
    }

    /* ===== 选择面板 ===== */
    .selector-panel {
      margin-top: 16px;
      padding: 20px;
      background: #fdfaf6;
      border-radius: 14px;
      border: 1px solid #f0e8e0;
      display: none;
    }

    .selector-panel.visible {
      display: block;
    }

    .selector-panel .selected-date-label {
      font-size: 14px;
      color: #8a7a70;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .selector-person {
      margin-bottom: 16px;
    }

    .selector-person:last-child {
      margin-bottom: 0;
    }

    .selector-person .person-label {
      font-size: 13px;
      color: #4a3f38;
      font-weight: 500;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 人物标识图形 */
    .person-icon {
      display: inline-block;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .person-icon.doujiang {
      background: #d4a990;
      border-radius: 50%;
    }

    .person-icon.shuishui {
      background: #b0a4c0;
      border-radius: 2px;
    }

    .mood-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mood-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #ede8e3;
      background: #ffffff;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .mood-btn:hover {
      border-color: #d4c8b8;
      background: #fdfaf6;
      transform: scale(1.05);
    }

    .mood-btn:active {
      transform: scale(0.95);
    }

    /* 选中态 */
    .mood-btn.happy.selected {
      border-color: #e8c878;
      background: #fef9ed;
    }

    .mood-btn.neutral.selected {
      border-color: #b0b8c0;
      background: #f4f5f6;
    }

    .mood-btn.angry.selected {
      border-color: #e08880;
      background: #fdf4f3;
    }

    .mood-btn.sad.selected {
      border-color: #88a4c8;
      background: #f3f6fa;
    }

    /* ===== 图例 ===== */
    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
      font-size: 12px;
      color: #b8a9a0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== 状态提示 ===== */
    .status-text {
      text-align: center;
      font-size: 13px;
      color: #c4b8af;
      margin-top: 16px;
      min-height: 20px;
    }

    .status-text.error {
      color: #d4a0a0;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 500px) {
      .calendar-wrapper {
        padding: 20px 12px 16px;
        border-radius: 14px;
      }

      .day-cell {
        min-height: 42px;
        border-radius: 8px;
      }

      .day-cell .day-num {
        font-size: 11px;
        margin-bottom: 2px;
      }

      .day-cell .mood-emoji {
        font-size: 12px;
      }

      .mood-btn {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }

      .mood-buttons {
        gap: 8px;
      }

      .selector-panel {
        padding: 14px;
      }

      .month-nav .current-month {
        font-size: 16px;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>

  <div class="calendar-wrapper">

    <!-- 标题 -->
    <div class="calendar-title">
      <span class="heart">💕</span> 恋爱日记 · 心情日历
    </div>

    <!-- 月份导航 -->
    <div class="month-nav">
      <button class="nav-btn" id="prev-month" title="上个月">◀</button>
      <span class="current-month" id="current-month-label"></span>
      <button class="nav-btn" id="next-month" title="下个月">▶</button>
    </div>

    <!-- 回到今天 -->
    <div class="back-today">
      <button class="back-today-btn hidden" id="back-today">回到今天</button>
    </div>

    <!-- 星期头 -->
    <div class="weekday-header">
      <span class="weekday">一</span>
      <span class="weekday">二</span>
      <span class="weekday">三</span>
      <span class="weekday">四</span>
      <span class="weekday">五</span>
      <span class="weekday weekend">六</span>
      <span class="weekday weekend">日</span>
    </div>

    <!-- 日历格子 -->
    <div class="calendar-grid" id="calendar-grid"></div>

    <!-- 心情选择面板 -->
    <div class="selector-panel" id="selector-panel">
      <div class="selected-date-label" id="selected-date-label"></div>

      <!-- 豆浆 -->
      <div class="selector-person">
        <div class="person-label">
          <span class="person-icon doujiang"></span> 豆浆
        </div>
        <div class="mood-buttons" id="selector-doujiang"></div>
      </div>

      <!-- 水水 -->
      <div class="selector-person">
        <div class="person-label">
          <span class="person-icon shuishui"></span> 水水
        </div>
        <div class="mood-buttons" id="selector-shuishui"></div>
      </div>
    </div>

    <!-- 图例 -->
    <div class="legend">
      <div class="legend-item">
        <span class="mood-dot circle"></span> 豆浆
      </div>
      <div class="legend-item">
        <span class="mood-dot square"></span> 水水
      </div>
    </div>

    <!-- 状态提示 -->
    <div class="status-text" id="status"></div>
  </div>

  <!-- ============================================ -->
  <!--  Firebase SDK                               -->
  <!-- ============================================ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      collection,
      query,
      where,
      documentId,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // ---- Firebase 配置 ----
    const firebaseConfig = {
      apiKey: "AIzaSyDH2ars1C0MrTORrrwA45rWxYnNjWAUsOQ",
      authDomain: "notion-mood.firebaseapp.com",
      projectId: "notion-mood",
      storageBucket: "notion-mood.firebasestorage.app",
      messagingSenderId: "299630555840",
      appId: "1:299630555840:web:908b6b35865a96ac8fb325"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ============================================
    //  ⚙️ 心情配置
    //     前期用 emoji，后期替换为狗图片
    // ============================================
    const MOODS = [
      {
        value: 'happy',
        label: '开心',
        cssClass: 'happy',
        // 🔧 后期换成狗图片，例如：
        // doujiangIcon: '<img src="博美-开心.png" style="width:24px;height:24px" />',
        doujiangIcon: '😊',
        shuishuiIcon: '😊',
      },
      {
        value: 'neutral',
        label: '平淡',
        cssClass: 'neutral',
        doujiangIcon: '😐',
        shuishuiIcon: '😐',
      },
      {
        value: 'angry',
        label: '生气',
        cssClass: 'angry',
        doujiangIcon: '😡',
        shuishuiIcon: '😡',
      },
      {
        value: 'sad',
        label: '伤心',
        cssClass: 'sad',
        doujiangIcon: '😢',
        shuishuiIcon: '😢',
      },
    ];

    const PERSON_A = 'doujiang';
    const PERSON_B = 'shuishui';

    // ============================================
    //  状态
    // ============================================
    let currentYear, currentMonth;       // 当前展示的年/月
    let selectedDate = null;            // 当前选中的日期 "YYYY-MM-DD"
    let moodData = {};                  // { "YYYY-MM-DD": { doujiang, shuishui } }
    let unsubscribe = null;             // Firestore 监听取消函数

    // ============================================
    //  工具函数
    // ============================================
    function getTodayStr() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getTodayYear() { return new Date().getFullYear(); }
    function getTodayMonth() { return new Date().getMonth() + 1; }
    function getTodayDay() { return new Date().getDate(); }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate(); // month is 1-based here, JS Date is 0-based
    }

    function getFirstDayOfWeek(year, month) {
      // 返回 1=周一, 7=周日
      const jsDay = new Date(year, month - 1, 1).getDay();
      return jsDay === 0 ? 7 : jsDay;
    }

    function formatDateChinese(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${parseInt(y)}年${parseInt(m)}月${parseInt(d)}日`;
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-text' + (isError ? ' error' : '');
    }

    // ============================================
    //  渲染日历网格
    // ============================================
    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      const daysInMon = daysInMonth(currentYear, currentMonth);
      const firstDay = getFirstDayOfWeek(currentYear, currentMonth);
      const todayStr = getTodayStr();
      const todayYear = getTodayYear();
      const todayMonth = getTodayMonth();
      const todayDay = getTodayDay();

      // 计算上月剩余天数（填充开头空白）
      const prevMonth = currentMonth === 1 ? 12 : currentMonth - 1;
      const prevYear = currentMonth === 1 ? currentYear - 1 : currentYear;
      const daysInPrev = daysInMonth(prevYear, prevMonth);

      // 生成所有格子
      const totalCells = Math.ceil((firstDay - 1 + daysInMon) / 7) * 7;

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        let dateStr, dayNum, isOtherMonth = false;

        if (i < firstDay - 1) {
          // 上月尾巴
          dayNum = daysInPrev - (firstDay - 1) + i + 1;
          const m = String(prevMonth).padStart(2, '0');
          const d = String(dayNum).padStart(2, '0');
          dateStr = `${prevYear}-${m}-${d}`;
          isOtherMonth = true;
        } else if (i - firstDay + 1 > daysInMon) {
          // 下月开头
          dayNum = i - firstDay - daysInMon + 2;
          const nextMonth = currentMonth === 12 ? 1 : currentMonth + 1;
          const nextYear = currentMonth === 12 ? currentYear + 1 : currentYear;
          const m = String(nextMonth).padStart(2, '0');
          const d = String(dayNum).padStart(2, '0');
          dateStr = `${nextYear}-${m}-${d}`;
          isOtherMonth = true;
        } else {
          // 当月
          dayNum = i - firstDay + 1;
          const m = String(currentMonth).padStart(2, '0');
          const d = String(dayNum).padStart(2, '0');
          dateStr = `${currentYear}-${m}-${d}`;
        }

        // 日期数字
        const numSpan = document.createElement('span');
        numSpan.className = 'day-num';
        numSpan.textContent = dayNum;
        cell.appendChild(numSpan);

        // 心情显示
        const data = moodData[dateStr];
        const djMood = data ? data[PERSON_A] : null;
        const ssMood = data ? data[PERSON_B] : null;

        const djMoodObj = MOODS.find(m => m.value === djMood);
        const ssMoodObj = MOODS.find(m => m.value === ssMood);

        // 豆浆行
        const rowDj = document.createElement('div');
        rowDj.className = 'mood-row';
        const dotDj = document.createElement('span');
        dotDj.className = 'mood-dot circle';
        rowDj.appendChild(dotDj);
        const emojiDj = document.createElement('span');
        emojiDj.className = 'mood-emoji';
        emojiDj.innerHTML = djMoodObj ? djMoodObj.doujiangIcon : '<span class="mood-empty">·</span>';
        rowDj.appendChild(emojiDj);
        cell.appendChild(rowDj);

        // 水水行
        const rowSs = document.createElement('div');
        rowSs.className = 'mood-row';
        const dotSs = document.createElement('span');
        dotSs.className = 'mood-dot square';
        rowSs.appendChild(dotSs);
        const emojiSs = document.createElement('span');
        emojiSs.className = 'mood-emoji';
        emojiSs.innerHTML = ssMoodObj ? ssMoodObj.shuishuiIcon : '<span class="mood-empty">·</span>';
        rowSs.appendChild(emojiSs);
        cell.appendChild(rowSs);

        // 样式类
        if (isOtherMonth) {
          cell.classList.add('other-month');
        }

        // 今天高亮
        if (dateStr === todayStr) {
          cell.classList.add('today');
        }

        // 选中高亮
        if (dateStr === selectedDate) {
          cell.classList.add('selected');
        }

        // 点击事件
        cell.addEventListener('click', () => {
          selectDate(dateStr);
        });

        grid.appendChild(cell);
      }

      // 更新月份标签
      document.getElementById('current-month-label').textContent =
        `${currentYear}年 ${currentMonth}月`;

      // 回到今天按钮
      const isCurrentMonth = (currentYear === todayYear && currentMonth === todayMonth);
      document.getElementById('back-today').classList.toggle('hidden', isCurrentMonth);

      // 重新渲染选择面板
      renderSelectorPanel();
    }

    // ============================================
    //  选择面板
    // ============================================
    function renderSelectorPanel() {
      const panel = document.getElementById('selector-panel');
      const label = document.getElementById('selected-date-label');

      if (!selectedDate) {
        panel.classList.remove('visible');
        return;
      }

      panel.classList.add('visible');
      label.textContent = formatDateChinese(selectedDate);

      const data = moodData[selectedDate] || {};

      // 豆浆按钮
      buildSelectorButtons('selector-doujiang', PERSON_A, 'doujiangIcon', data[PERSON_A], selectedDate);
      // 水水按钮
      buildSelectorButtons('selector-shuishui', PERSON_B, 'shuishuiIcon', data[PERSON_B], selectedDate);
    }

    function buildSelectorButtons(containerId, personKey, iconKey, selectedMood, dateStr) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      MOODS.forEach(mood => {
        const btn = document.createElement('button');
        btn.className = `mood-btn ${mood.cssClass}`;
        btn.innerHTML = mood[iconKey];
        btn.title = mood.label;

        if (mood.value === selectedMood) {
          btn.classList.add('selected');
        }

        btn.addEventListener('click', async () => {
          // 乐观更新
          document.querySelectorAll(`#${containerId} .mood-btn`).forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');

          try {
            await setDoc(
              doc(db, 'moods', dateStr),
              { [personKey]: mood.value },
              { merge: true }
            );
            setStatus('已保存', false);
          } catch (err) {
            console.error('保存失败:', err);
            setStatus('保存失败，请检查网络', true);
          }
        });

        container.appendChild(btn);
      });
    }

    function selectDate(dateStr) {
      if (selectedDate === dateStr) {
        // 再次点击取消选中
        selectedDate = null;
      } else {
        selectedDate = dateStr;
      }
      renderCalendar();
    }

    // ============================================
    //  Firestore 实时监听当前月份
    // ============================================
    function subscribeMonth() {
      // 取消之前的监听
      if (unsubscribe) {
        unsubscribe();
        unsubscribe = null;
      }

      const m = String(currentMonth).padStart(2, '0');
      const lastDay = daysInMonth(currentYear, currentMonth);
      const startDate = `${currentYear}-${m}-01`;
      const endDate = `${currentYear}-${m}-${String(lastDay).padStart(2, '0')}`;

      const q = query(
        collection(db, 'moods'),
        where(documentId(), '>=', startDate),
        where(documentId(), '<=', endDate)
      );

      setStatus('加载中...', false);

      unsubscribe = onSnapshot(q, (snapshot) => {
        // 更新 moodData
        snapshot.docChanges().forEach(change => {
          const id = change.doc.id;
          if (change.type === 'removed') {
            delete moodData[id];
          } else {
            moodData[id] = change.doc.data();
          }
        });

        // 清掉不在当前月份的数据（可选，避免数据堆积）
        // 这里保留所有已加载数据，方便跨月时已有缓存

        setStatus('', false);
        renderCalendar();
      }, (err) => {
        console.error('监听失败:', err);
        setStatus('连接失败，请刷新页面', true);
        renderCalendar();
      });
    }

    // ============================================
    //  月份导航
    // ============================================
    function goToMonth(year, month) {
      currentYear = year;
      currentMonth = month;
      selectedDate = null;
      subscribeMonth();
    }

    function goToPrevMonth() {
      if (currentMonth === 1) {
        goToMonth(currentYear - 1, 12);
      } else {
        goToMonth(currentYear, currentMonth - 1);
      }
    }

    function goToNextMonth() {
      if (currentMonth === 12) {
        goToMonth(currentYear + 1, 1);
      } else {
        goToMonth(currentYear, currentMonth + 1);
      }
    }

    function goToToday() {
      goToMonth(getTodayYear(), getTodayMonth());
    }

    // ============================================
    //  启动
    // ============================================
    document.getElementById('prev-month').addEventListener('click', goToPrevMonth);
    document.getElementById('next-month').addEventListener('click', goToNextMonth);
    document.getElementById('back-today').addEventListener('click', goToToday);

    // 初始化：显示当前月份
    currentYear = getTodayYear();
    currentMonth = getTodayMonth();
    subscribeMonth();
  </script>

</body>
</html>
